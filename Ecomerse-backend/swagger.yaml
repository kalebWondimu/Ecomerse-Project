openapi: 3.0.0
info:
  title: E-commerce Backend API
  version: "1.0"
  description: API documentation for the e-commerce backend
servers:
  - url: http://localhost:5000

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        phone:
          type: string
          nullable: true
        role:
          type: string
        token:
          type: string
        isVerified:
          type: boolean
    OTPVerification:
      type: object
      properties:
        email:
          type: string
          format: email
        otp:
          type: string
          minLength: 6
          maxLength: 6
          description: 6-digit OTP code
    OTPResponse:
      type: object
      properties:
        message:
          type: string
    Product:
    Product:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        price:
          type: number
        categoryId:
          type: integer
        stock:
          type: number
        images:
          type: array
          items:
            type: string
        averageRating:
          type: number
    Cart:
      type: object
      properties:
        userId:
          type: integer
        items:
          type: array
          items:
            type: object
        totalPrice:
          type: number
    Order:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        items:
          type: array
        totalAmount:
          type: number
        status:
          type: string
        paymentMethod:
          type: string
        paymentStatus:
          type: string
        transactionId:
          type: string
        shippingAddress:
          type: string
    Review:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        productId:
          type: integer
        rating:
          type: number
        comment:
          type: string
    PaymentInitiation:
      type: object
      properties:
        orderId:
          type: integer
        amount:
          type: number
        phoneNumber:
          type: string
        email:
          type: string
          format: email
        accountNumber:
          type: string
      required:
        - orderId
        - amount
    PaymentResponse:
      type: object
      properties:
        success:
          type: boolean
        transactionId:
          type: string
        message:
          type: string
        paymentUrl:
          type: string
        checkoutUrl:
          type: string
        bankDetails:
          type: object
    PaymentCallback:
      type: object
      properties:
        transactionId:
          type: string
        status:
          type: string
        orderId:
          type: integer

security:
  - bearerAuth: []

paths:
  /api/auth/register:
    post:
      summary: Register a new user with OTP verification
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 6
      responses:
        "201":
          description: Registration successful, OTP sent to email
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  id:
                    type: integer
                  name:
                    type: string
                  email:
                    type: string
                  phone:
                    type: string
                    nullable: true
                  isVerified:
                    type: boolean
        "400":
          description: Bad request - User already exists or invalid data
  /api/auth/login:
    post:
      summary: Authenticate user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  name:
                    type: string
                  email:
                    type: string
                  token:
                    type: string
                  verifyToken:
                    type: string
        "401":
          description: Unauthorized
  /api/auth/verify-otp:
    post:
      summary: Verify user email with OTP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OTPVerification'
      responses:
        "200":
          description: Email verified successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        "400":
          description: Bad request - Invalid OTP or expired
        "404":
          description: User not found
  /api/auth/resend-otp:
    post:
      summary: Resend OTP verification code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
      responses:
        "200":
          description: OTP sent successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OTPResponse'
        "400":
          description: Bad request
        "404":
          description: User not found
  /api/auth/forgot-password:
    post:
      summary: Generate password reset token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
      responses:
        "200":
          description: Token generated
  /api/auth/reset-password/{token}:
    post:
      summary: Reset password using token
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                password:
                  type: string
      responses:
        "200":
          description: Password updated
        "400":
          description: Bad request
        "401":
          description: Unauthorized or expired token
  /api/auth/verify/{token}:
    get:
      summary: Verify email address
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Email verified
        "400":
          description: Bad request
        "401":
          description: Invalid or expired token

  /api/users/profile:
    get:
      security:
        - bearerAuth: []
      summary: Get user profile
      responses:
        "200":
          description: OK
    put:
      security:
        - bearerAuth: []
      summary: Update user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                email:
                  type: string
                password:
                  type: string
      responses:
        "200":
          description: OK

  /api/users/orders:
    get:
      security:
        - bearerAuth: []
      summary: Get user's orders
      responses:
        "200":
          description: OK

  /api/products:
    get:
      summary: Get all products
      parameters:
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
        - name: search
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
        - name: minPrice
          in: query
          schema:
            type: number
        - name: maxPrice
          in: query
          schema:
            type: number
      responses:
        "200":
          description: OK
    post:
      security:
        - bearerAuth: []
      summary: Create product (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Product"
      responses:
        "201":
          description: Created
  /api/products/{id}:
    get:
      summary: Get product by id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
    put:
      security:
        - bearerAuth: []
      summary: Update product (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Product"
      responses:
        "200":
          description: OK
    delete:
      security:
        - bearerAuth: []
      summary: Delete product (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
  /api/products/search:
    get:
      summary: Search products
      parameters:
        - name: q
          in: query
          schema:
            type: string
      responses:
        "200":
          description: OK

  /api/cart:
    get:
      security:
        - bearerAuth: []
      summary: Get current user's cart
      responses:
        "200":
          description: OK
    delete:
      security:
        - bearerAuth: []
      summary: Clear cart
      responses:
        "200":
          description: OK
  /api/cart/items:
    post:
      security:
        - bearerAuth: []
      summary: Add item to cart
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                productId:
                  type: string
                quantity:
                  type: integer
      responses:
        "200":
          description: OK
  /api/cart/items/{id}:
    put:
      security:
        - bearerAuth: []
      summary: Update item quantity
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                quantity:
                  type: integer
      responses:
        "200":
          description: OK
    delete:
      security:
        - bearerAuth: []
      summary: Remove item from cart
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK

  /api/orders:
    post:
      security:
        - bearerAuth: []
      summary: Create order from cart
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                paymentMethod:
                  type: string
                shippingAddress:
                  type: string
      responses:
        "201":
          description: Created
    get:
      security:
        - bearerAuth: []
      summary: Get all orders for user
      responses:
        "200":
          description: OK
  /api/orders/{id}:
    get:
      security:
        - bearerAuth: []
      summary: Get order by id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
    delete:
      security:
        - bearerAuth: []
      summary: Cancel order (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
  /api/orders/{id}/status:
    put:
      security:
        - bearerAuth: []
      summary: Update order status (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
      responses:
        "200":
          description: OK

  /api/reviews/{productId}:
    post:
      security:
        - bearerAuth: []
      summary: Add review to product
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                rating:
                  type: integer
                comment:
                  type: string
      responses:
        "201":
          description: Created
    get:
      summary: Get reviews for product
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
  /api/reviews/{id}:
    put:
      security:
        - bearerAuth: []
      summary: Update review
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                rating:
                  type: integer
                comment:
                  type: string
      responses:
        "200":
          description: OK
    delete:
      security:
        - bearerAuth: []
      summary: Delete review
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK

  /api/admin/users:
    get:
      security:
        - bearerAuth: []
      summary: Get all users (admin)
      responses:
        "200":
          description: OK

  /api/admin/orders:
    get:
      security:
        - bearerAuth: []
      summary: Get all orders (admin)
      responses:
        "200":
          description: OK

  /api/admin/stats:
    get:
      security:
        - bearerAuth: []
      summary: Get admin statistics
      responses:
        "200":
          description: OK

  /api/payments/telebirr/initiate:
    post:
      security:
        - bearerAuth: []
      summary: Initiate Telebirr payment for an order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentInitiation'
      responses:
        "200":
          description: Payment initiation details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentResponse'
        "400":
          description: Invalid request
        "404":
          description: Order not found

  /api/payments/chapa/initiate:
    post:
      security:
        - bearerAuth: []
      summary: Initiate Chapa payment for an order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentInitiation'
      responses:
        "200":
          description: Checkout URL for Chapa
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentResponse'
        "400":
          description: Invalid request
        "404":
          description: Order not found

  /api/payments/cbe/initiate:
    post:
      security:
        - bearerAuth: []
      summary: Initiate CBE Bank payment for an order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentInitiation'
      responses:
        "200":
          description: Bank transfer details and reference number
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentResponse'
        "400":
          description: Invalid request
        "404":
          description: Order not found

  /api/payments/telebirr/callback:
    post:
      summary: Telebirr callback endpoint
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentCallback'
      responses:
        "200":
          description: Payment result acknowledged

  /api/payments/chapa/callback:
    post:
      summary: Chapa callback endpoint
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentCallback'
      responses:
        "200":
          description: Payment result acknowledged

  /api/payments/cbe/callback:
    post:
      summary: CBE callback endpoint
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentCallback'
      responses:
        "200":
          description: Payment result acknowledged

  /api/payments/verify/{transactionId}:
    get:
      security:
        - bearerAuth: []
      summary: Verify payment status by transaction ID
      parameters:
        - name: transactionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Payment status
          content:
            application/json:
              schema:
                type: object
                properties:
                  transactionId:
                    type: string
                  paymentStatus:
                    type: string
                  orderStatus:
                    type: string
                  amount:
                    type: number
        "404":
          description: Transaction not found
